{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Оставить отзыв | Доктор Гвоздев</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<header>
    <div class="logo">Gvozdev.MU</div>
    <nav><a href="/">← На главную</a></nav>
</header>
<section style="padding: 120px 5%;">
    <div class="container" style="max-width: 600px;">
        <h2>Оставить отзыв</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: 1.5rem;">
                {{ form.name.label_tag }}
                {{ form.name }}
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                {{ form.age.label_tag }}
                {{ form.age }}
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                {{ form.text.label_tag }}
                {{ form.text }}
            </div>
            <button type="submit" class="btn">Отправить на модерацию</button>
        </form>
    </div>
</section>
</body>
</html>
